# Managed by Ansible
{% set ns = namespace(self_site='') %}
{% for site_name, site_hosts in (wireguard_mesh.sites | default({})).items() %}
{%   if inventory_hostname in site_hosts %}
{%     set ns.self_site = site_name %}
{%   endif %}
{% endfor %}

[Interface]
PrivateKey = {{ wireguard_private_key.content | b64decode | trim }}
{% if inventory_hostname in (wireguard_mesh.host_endpoints | default({})) %}
ListenPort = {{ wireguard_port }}
{% endif %}
{% if wireguard_address | default('') %}
Address = {{ wireguard_address }}
{% endif %}
{% if inventory_hostname in (wireguard_mesh.host_interface_addresses | default({})) %}
Address = {{ wireguard_mesh.host_interface_addresses[inventory_hostname] }}
{% endif %}
{% if inventory_hostname not in (wireguard_mesh.host_interface_addresses | default({})) and inventory_hostname in (wireguard_mesh.host_allowed_ips | default({})) %}
{%   set self_ip = wireguard_mesh.host_allowed_ips[inventory_hostname] %}
{%   for site_name, site_hosts in wireguard_mesh.sites.items() %}
{%     if site_name != ns.self_site %}
{%       for peer_name in site_hosts %}
PostUp = ip route replace {{ wireguard_mesh.host_allowed_ips[peer_name] }}/32 dev wg0 src {{ self_ip }}
{%       endfor %}
{%     endif %}
{%   endfor %}
{% endif %}

{% for peer in wireguard_peers | default([]) %}
[Peer]
# manual peer
PublicKey = {{ peer.public_key }}
AllowedIPs = {{ peer.address }}
{% if peer.endpoint | default('') %}
Endpoint = {{ peer.endpoint }}
{% endif %}
{% if peer.keepalive | default('') %}
PersistentKeepalive = {{ peer.keepalive }}
{% endif %}

{% endfor %}
{% for site_name, site_hosts in (wireguard_mesh.sites | default({})).items() %}
{%   if site_name != ns.self_site %}
{%     for peer_name in site_hosts %}
{%       set self_has_endpoint = inventory_hostname in wireguard_mesh.host_endpoints %}
{%       set peer_has_endpoint = peer_name in wireguard_mesh.host_endpoints %}
{%       if self_has_endpoint or peer_has_endpoint %}
[Peer]
# {{ peer_name }} ({{ site_name }})
PublicKey = {{ lookup('file', playbook_dir + '/wireguard-pubkeys/' + peer_name + '.pub') | trim }}
{%         if peer_has_endpoint %}
Endpoint = {{ wireguard_mesh.host_endpoints[peer_name] }}:{{ wireguard_port }}
{%         endif %}
AllowedIPs = {{ wireguard_mesh.host_allowed_ips[peer_name] }}/32
PersistentKeepalive = {{ wireguard_mesh_keepalive }}

{%       endif %}
{%     endfor %}
{%   endif %}
{% endfor %}
